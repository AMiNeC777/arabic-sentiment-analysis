project:
  name: arabic-sentiment-analysis
  random_state: 42

paths:
  raw_data_dir: data/raw
  processed_data_dir: data/processed
  results_file: experiments/results.csv
  logs_dir: experiments/logs
  saved_models_dir: models/saved_models

data:
  dataset_name: ASTD
  text_column: text
  label_column: label
  test_size: 0.2
  val_size: 0.1

preprocessing:
  remove_urls: true
  remove_mentions: true
  remove_hashtags: false
  normalize_arabic: true

features:
  method: tfidf
  max_features: 20000
  ngram_range: [1, 2]

training:
  model_type: ml
  model_name: svm
  batch_size: 32
  epochs: 5
  learning_rate: 0.0001

evaluation:
  average: macro
